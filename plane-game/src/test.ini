import Input from "./input.js";
import EntityManager from "./EntityManager.js";
import spawner from "../Spawner.js";
import Player  from "./player.js";
import powerUp from "../powerups.js"
import Background from "../Background.js";
import MenuScreen from "../MenuScreen.js";
import GameOverScreen from "../GameOverScreen.js";

import { Explosion } from "../Explosion.js";

// ─── Game states ───────────────────────────────────────────────────────────
// 'menu'      → menu showing
// 'intro'     → player flies up from bottom
// 'playing'   → normal gameplay
// 'gameover'  → game over screen

export default class Game {
    constructor(canvas, ctx) {
        this.canvas = canvas;
        this.ctx    = ctx;
        this.w      = canvas.width;
        this.h      = canvas.height;

        this.input   = new Input();
        this.running = false;
        this.score   = 0;
        this.state   = 'menu';

        // Assets available before game starts
        this.background = new Background();

        this.explosionImg = [];
        for (let i = 1; i <= 16; i++) {
            const tmp = new Image();
            tmp.src = `./src/engine/assets/explosions/${i}.png`;
            this.explosionImg.push(tmp);
        }

        this.missileImage = new Image();
        this.missileImage.src = './src/engine/assets/missilePickUp.png';

        this.bgm = new Audio('./src/engine/assets/bgm.mp3');
        this.bgm.loop  = true;
        this.music     = false;

        // Game objects — created when START is pressed
        this.entities = null;
        this.spawner  = null;
        this.player   = null;

        // Screens
        this.menu = null;
        this.gameOverScreen = null;

        // Intro animation state
        this._intro = {
            targetY:  0,
            startY:   0,
            progress: 0,
            duration: 1.8,
        };

        // Shared timestamps
        this.lastTime      = 0;
        this._menuLastTime = 0;

        // Start the menu
        this.menu = new MenuScreen(canvas, ctx, this);
        this._menuLoop = this._menuLoop.bind(this);
        requestAnimationFrame(this._menuLoop);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // MENU LOOP
    // ═══════════════════════════════════════════════════════════════════════

    _menuLoop(timeStamp) {
        if (this.state !== 'menu') return;

        const dt = Math.min((timeStamp - (this._menuLastTime || timeStamp)) / 1000, 0.05);
        this._menuLastTime = timeStamp;

        this.background.update(dt);
        this.menu.update(dt);

        this.ctx.clearRect(0, 0, this.w, this.h);
        this.menu.draw(this.ctx);

        requestAnimationFrame(this._menuLoop);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // START — called by MenuScreen when SCRAMBLE is clicked
    // ═══════════════════════════════════════════════════════════════════════

    start() {
        // Initialise game objects now
        this.entities = new EntityManager();
        this.spawner  = new spawner(this);
        this.player   = new Player(this.w, this.h, this);
        this.entities.add(this.player);

        // Hook player death
        this.player.onDeath = () => {
            this.handlePlayerDeath();
        };

        // Position player off the bottom of the screen
        const intro     = this._intro;
        intro.targetY   = this.h / 2 - this.player.h / 2;
        intro.startY    = this.h + 20;
        intro.progress  = 0;

        // Lock player input and movement during intro
        this.player.x = this.w / 2 - this.player.w / 2;
        this.player.y = intro.startY;

        // Switch state — main loop takes over
        this.state = 'intro';

        if (!this.music) {
            this.bgm.play().catch(() => {});
            this.music = true;
        }

        requestAnimationFrame(this.loop.bind(this));
    }

    // ═══════════════════════════════════════════════════════════════════════
    // PLAYER DEATH
    // ═══════════════════════════════════════════════════════════════════════

    handlePlayerDeath() {
        console.log("Player died! Final score:", this.score);
        
        // Stop spawning
        if (this.spawner) {
            this.spawner.stopSpawning();
        }

        // Switch to game over after a brief delay
        setTimeout(() => {
            this.state = 'gameover';
            this.gameOverScreen = new GameOverScreen(this.canvas, this.ctx, this, this.score);
        }, 1500); // 1.5 second delay to see death explosion
    }

    // ═══════════════════════════════════════════════════════════════════════
    // MAIN LOOP
    // ═══════════════════════════════════════════════════════════════════════

    loop(timeStamp) {
        if (this.state === 'menu') return;

        const dt = Math.min((timeStamp - this.lastTime) / 1000 || 0, 0.05);
        this.lastTime = timeStamp;

        this.update(dt);
        this.draw(this.ctx);

        requestAnimationFrame(this.loop.bind(this));
    }

    // ═══════════════════════════════════════════════════════════════════════
    // UPDATE
    // ═══════════════════════════════════════════════════════════════════════

    update(dt) {
        this.background.update(dt);

        if (this.state === 'intro') {
            this._updateIntro(dt);
            return;
        }

        if (this.state === 'gameover') {
            if (this.gameOverScreen) {
                this.gameOverScreen.update(dt);
            }
            // Still update entities so explosions play out
            this.entities.update(dt, this);
            return;
        }

        // Normal gameplay
        if (this.state === 'playing') {
            this.spawner.update(dt);
            this.entities.update(dt, this);
            this.entities.resolveCollision(this);
            this.entities.cleanup();
        }
    }

    _updateIntro(dt) {
        const intro = this._intro;
        intro.progress = Math.min(intro.progress + dt / intro.duration, 1);

        const t = _easeOutCubic(intro.progress);

        this.player.y = intro.startY + (intro.targetY - intro.startY) * t;
        this.player.x = this.w / 2 - this.player.w / 2;

        if (intro.progress >= 1) {
            this.player.y = intro.targetY;
            this.state    = 'playing';
        }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // DRAW
    // ═══════════════════════════════════════════════════════════════════════

    draw(ctx) {
        ctx.clearRect(0, 0, this.w, this.h);
        this.background.draw(ctx);
        this.entities.draw(ctx);

        if (this.state === 'intro') {
            this._drawIntroOverlay(ctx);
        }

        if (this.state === 'playing') {
            this.drawHUD(ctx);
        }

        if (this.state === 'gameover' && this.gameOverScreen) {
            this.gameOverScreen.draw(ctx);
        }
    }

    _drawIntroOverlay(ctx) {
        const progress = this._intro.progress;

        // Engine exhaust trail
        const px = this.player.x + this.player.w / 2;
        const py = this.player.y + this.player.h;

        ctx.save();
        for (let i = 0; i < 10; i++) {
            const t      = i / 10;
            const trailY = py + t * 40;
            const alpha  = (1 - t) * 0.45 * (1 - progress * 0.5);
            const r      = (1 - t) * 5;
            ctx.beginPath();
            ctx.arc(px, trailY, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,${140 + t * 80 | 0},40,${alpha})`;
            ctx.fill();
        }
        ctx.restore();

        // "SCRAMBLING..." text
        const textAlpha = Math.max(0, 1 - progress * 2.5);
        if (textAlpha > 0) {
            ctx.save();
            ctx.font         = 'bold 14px "Courier New", monospace';
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle    = `rgba(220,190,100,${textAlpha})`;
            ctx.fillText('SCRAMBLING...', this.w / 2, this.h * 0.75);
            ctx.restore();
        }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // HUD
    // ═══════════════════════════════════════════════════════════════════════

    drawHUD(ctx) {
        const padding = 10;

        // ── Top bar background with worn metal texture ──────────────────────────
        const barH = 52;
        const grad = ctx.createLinearGradient(0, 0, 0, barH);
        grad.addColorStop(0,   'rgba(20,18,12,0.92)');
        grad.addColorStop(0.5, 'rgba(28,24,16,0.88)');
        grad.addColorStop(1,   'rgba(20,18,12,0.92)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, this.w, barH);

        // Metal rivets
        const rivetY = [8, barH - 8];
        const rivetX = [12, this.w / 2 - 60, this.w / 2 + 60, this.w - 12];
        ctx.save();
        for (const rx of rivetX) {
            for (const ry of rivetY) {
                ctx.beginPath();
                ctx.arc(rx, ry, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(60,50,30,0.8)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(rx - 1, ry - 1, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(140,120,80,0.4)';
                ctx.fill();
            }
        }
        ctx.restore();

        // Top edge highlight
        ctx.strokeStyle = 'rgba(100,80,50,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 1);
        ctx.lineTo(this.w, 1);
        ctx.stroke();

        // Bottom edge shadow
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.moveTo(0, barH - 1);
        ctx.lineTo(this.w, barH - 1);
        ctx.stroke();

        // ── HP Bar (left side) ──────────────────────────────────────────────────
        const barX = padding + 4;
        const barY = 16;
        const barW = 180;
        const barH2 = 20;
        const hpRatio = this.player.hp / this.player.maxHp;

        // Label above bar
        ctx.save();
        ctx.font = 'bold 9px "Courier New", monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = 'rgba(200,180,120,0.7)';
        ctx.fillText('HULL INTEGRITY', barX, barY - 2);
        ctx.restore();

        // Outer frame
        ctx.fillStyle = 'rgba(40,35,25,0.9)';
        ctx.fillRect(barX - 2, barY - 2, barW + 4, barH2 + 4);

        // Inner background
        ctx.fillStyle = '#0a0806';
        ctx.fillRect(barX, barY, barW, barH2);

        // HP fill with gradient
        const hpGrad = ctx.createLinearGradient(barX, barY, barX, barY + barH2);
        if (hpRatio > 0.5) {
            hpGrad.addColorStop(0, '#6fb368');
            hpGrad.addColorStop(1, '#4a8c45');
        } else if (hpRatio > 0.3) {
            hpGrad.addColorStop(0, '#d4a54e');
            hpGrad.addColorStop(1, '#b88a3c');
        } else {
            hpGrad.addColorStop(0, '#c84a3c');
            hpGrad.addColorStop(1, '#a03428');
        }
        ctx.fillStyle = hpGrad;
        ctx.fillRect(barX, barY, barW * hpRatio, barH2);

        // Segments / tick marks
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 1;
        for (let i = 1; i < 4; i++) {
            const x = barX + (barW / 4) * i;
            ctx.beginPath();
            ctx.moveTo(x, barY);
            ctx.lineTo(x, barY + barH2);
            ctx.stroke();
        }

        // Border
        ctx.strokeStyle = 'rgba(120,100,60,0.6)';
        ctx.lineWidth = 1;
        ctx.strokeRect(barX + 0.5, barY + 0.5, barW - 1, barH2 - 1);

        // HP percentage text
        ctx.save();
        ctx.font = 'bold 11px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = hpRatio > 0.3 ? '#f0e8cc' : '#ffddcc';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 3;
        ctx.fillText(`${Math.floor(hpRatio * 100)}%`, barX + barW / 2, barY + barH2 / 2);
        ctx.restore();

        // ── Missiles (right side, upper) ────────────────────────────────────────
        const missileX = this.w - padding - 95;
        const missileY = 8;

        // Panel background
        ctx.fillStyle = 'rgba(40,35,25,0.7)';
        ctx.fillRect(missileX - 4, missileY - 2, 88, 24);
        ctx.strokeStyle = 'rgba(120,100,60,0.4)';
        ctx.lineWidth = 1;
        ctx.strokeRect(missileX - 3.5, missileY - 1.5, 87, 23);

        // Label
        ctx.save();
        ctx.font = 'bold 8px "Courier New", monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillStyle = 'rgba(200,160,80,0.65)';
        ctx.fillText('ORDNANCE', missileX, missileY);
        ctx.restore();

        // Missile icon
        ctx.drawImage(this.missileImage, missileX + 2, missileY + 9, 8, 14);

        // Count
        ctx.save();
        ctx.font = 'bold 13px "Courier New", monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = this.player.missileCount > 0 ? '#f0e8cc' : 'rgba(160,140,100,0.5)';
        ctx.fillText(`× ${this.player.missileCount}`, missileX + 16, missileY + 15);
        ctx.restore();

        // ── Score (right side, lower) ───────────────────────────────────────────
        const scoreY = 32;
        
        ctx.save();
        ctx.font = '9px "Courier New", monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillStyle = 'rgba(200,180,120,0.6)';
        ctx.fillText('SCORE', this.w - padding - 4, scoreY);

        ctx.font = 'bold 14px "Courier New", monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillStyle = '#e8d8a0';
        ctx.shadowColor = 'rgba(200,160,80,0.4)';
        ctx.shadowBlur = 6;
        ctx.fillText(this.score.toString().padStart(6, '0'), this.w - padding - 4, scoreY + 9);
        ctx.restore();
    }
}

// ─── Helpers ──────────────────────────────────────────────────────────────

function _easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
}